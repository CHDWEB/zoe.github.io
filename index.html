<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2f7d6b">
    <title>Zoe的算数通关</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="app" class="shell">
      <section class="hero" aria-label="游戏区域">
        <div class="hero-art" aria-hidden="true">
          <img src="./assets/rocket.svg" alt="">
        </div>
        <div class="hero-copy">
          <p class="eyebrow">20以内加减法</p>
          <h1>Zoe的算数通关</h1>
        </div>
      </section>

      <section class="game-board" aria-label="答题面板">
        <div class="topbar">
          <div>
            <p class="label">当前关卡</p>
            <h2 id="levelTitle">准备开始</h2>
            <p id="levelDescription" class="muted">完成目标就能进入下一关。</p>
          </div>
          <div class="timer" id="timer">练习</div>
        </div>

        <div class="level-track" id="levelTrack" aria-label="关卡进度"></div>

        <div class="stats" aria-label="成绩">
          <div>
            <span class="stat-value" id="score">0/8</span>
            <span class="stat-label">答对</span>
          </div>
          <div>
            <span class="stat-value" id="accuracy">0%</span>
            <span class="stat-label">正确率</span>
          </div>
          <div>
            <span class="stat-value" id="streak">0</span>
            <span class="stat-label">连对</span>
          </div>
        </div>

        <div class="progress-shell" aria-hidden="true">
          <div class="progress-fill" id="progress"></div>
        </div>

        <div class="problem-card">
          <div class="problem" id="problem">准备开始</div>
          <div class="equals">=</div>
          <div class="answer" id="answer">?</div>
        </div>

        <p class="feedback" id="feedback" data-tone="neutral">点击数字开始答题</p>

        <div class="keypad" id="keypad" aria-label="数字键盘"></div>

        <div class="actions">
          <button class="action primary" id="startPractice" type="button">闯关练习</button>
          <button class="action" id="startChallenge" type="button">60秒挑战</button>
          <button class="action" id="toggleSound" type="button" aria-pressed="true">声音开</button>
          <button class="action" id="nextLevel" type="button" disabled>下一关</button>
          <button class="action quiet" id="resetProgress" type="button">重置</button>
        </div>

        <div class="summary" id="summary" hidden>
          <p id="summaryText"></p>
        </div>
      </section>
    </main>
    <script type="module" src="./src/app.mjs"></script>
  </body>
</html>
